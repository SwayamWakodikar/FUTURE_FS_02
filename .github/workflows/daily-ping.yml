name: Keep Server Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          echo "Pinging at $(date)"
          curl -L --retry 5 --retry-delay 5 --max-time 60 https://quantivecrm.onrender.com
